version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
      include: scope
    labels:
      - dependencies
    groups:
      vue:
        patterns:
          - "vue"
          - "@vue/*"
          - "@vitejs/plugin-vue"
          - "vue-tsc"
      vite:
        patterns:
          - "vite"
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      lint:
        patterns:
          - "eslint*"
          - "@eslint/*"
          - "@typescript-eslint/*"
          - "prettier"
          - "eslint-plugin-*"
          - "eslint-config-*"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    commit-message:
      prefix: "ci(deps)"
    labels:
      - ci
      - dependencies
