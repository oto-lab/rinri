name: 🐛 Bug report
description: Report a bug on the rinri site or build
title: 'bug: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill out as much of the form as you can.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I click the X share button, ...
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps that consistently reproduce the issue.
      placeholder: |
        1. Open https://技術者倫理.com
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser / OS
      placeholder: e.g. Chrome 131 / macOS 15
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Console logs / screenshots
      render: shell
    validations:
      required: false
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
